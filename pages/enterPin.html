<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enter PIN</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style/enterPin.css">
</head>
<body>
    <main class="container">
        <!--bagian kiri-->
        <section class="left">
            <div class="logo">
                <img class="logo_image" src="../asset/money_wallet.png" alt="logo">
                <p class="brand">E-Wallet</p>
            </div>

            <div class="desc">
                <h1 class="desc1">
                   Enter Your Pin 👋
                </h1>
                <p class="desc2">
                    Please save your pin because this so important.     
                </p>
            </div>

            <div class="input-pin">
                <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*">
                <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*">
                <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*">
                <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*">
                <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*">
                <input type="text" inputmode="numeric" maxlength="1" pattern="[0-9]*">
            </div>

          
           

            <button onclick="location.href='../pages/dashboardV2.html'" class="btn-submit">Submit</button>

            <div class="reset">
                <p>Forgot Your PIN? <a href="#">Reset</a></p>
                
            </div>
        </section>

        <!--bagian kanan-->
        <aside class="illustration">
            <img src="../asset/character.png" alt="illustration">
        </aside>

    </main>
</body>
</html>
