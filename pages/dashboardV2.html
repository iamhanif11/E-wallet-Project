<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashbaord V2</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../style/dashboardV2.css" />
    <link rel="stylesheet" href="../style/dashboardV1.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img class="logo_image" src="../asset/money_wallet.png" alt="logo" />
        <p class="brand">E-Wallet</p>
      </div>

      <div class="profil">
        <img src="../asset/Search.svg" alt="search" />
        <img src="../asset/ShoppingCart.svg" alt="cart" />
        <img src="../asset/Ellipse 185.svg" class="pp" alt="photo" />
        <img src="../asset/down.svg" alt="dropdown" />
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="menu">
          <button>
            <img src="../asset/dashboard-two (1).svg" alt="dashboard" />
            <p>Dashboard</p>
          </button>
          <button>
            <img src="../asset/Send.svg" alt="transfer" />
            <p>Transfer</p>
          </button>
          <button>
            <img src="../asset/history.svg" alt="history" />
            <p>History</p>
          </button>
          <button>
            <img src="../asset/Upload.svg" alt="top Up" />
            <p>Top Up</p>
          </button>
          <button>
            <img src="../asset/2 User.svg" alt="profile" />
            <p>Profile</p>
          </button>
          <button class="exit">
            <img src="../asset/Icon.svg" alt="Exit" />
            <p>Keluar</p>
          </button>
        </div>
      </section>

      <section class="hero-1">
        <div class="information">
          <div class="box-information">
            <div class="head">
              <img src="../asset/balance.svg" alt="balance" />
              <p>Balance</p>
            </div>
            <h3>Rp.120.000</h3>
            <div class="tail">
              <div class="add">
                <h4>Income</h4>
                <div class="more">
                  <p class="in">Rp.200.000 +2%</p>
                  <img src="../asset/ArrowRise-s.png" alt="arrow" />
                </div>
              </div>
              <div class="add">
                <h4>Expense</h4>
                <div class="more">
                  <p class="out-1">Rp.100.000 +5%</p>
                  <img src="../asset/ArrowRise-red.svg" alt="arrow" />
                </div>
              </div>
            </div>
          </div>
          <div class="service-1">
            <h3>Fast Service</h3>
            <div class="btn-service">
              <button>
                <img src="../asset/u_money-insert.svg" alt="insert" />
                <p>Top Up</p>
              </button>
              <button>
                <img src="../asset/Send.svg" alt="send" />
                <p>Transfer</p>
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="chart-history">
        <div class="box-chart">
          <div class="chart-header">
            <h3>Financial Chart</h3>
            <div class="chart-filters">
              <button class="chip">
                7 Days <img src="../asset/down.svg" alt="down" />
              </button>
              <button class="chip">
                All <img src="../asset/down.svg" alt="down" />
              </button>
            </div>
          </div>

          <div class="bar-chart">
            <img src="../asset/sc-chart.png" alt="chart" />
          </div>
        </div>
        
      </section>
    </main>
  </body>
</html>
