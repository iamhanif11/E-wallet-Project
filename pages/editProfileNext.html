<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Profile Proces</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/style/editProfileNext.css" />
  </head>
  <body>
    <header>
      <div class="logo">
        <img class="logo_image" src="../asset/money_wallet.png" alt="logo" />
        <p class="brand">E-Wallet</p>
      </div>
      <div class="profil">
        <p>Ghaluh Wizard</p>
        <img class="avatar" src="../asset/Ellipse 185.svg" alt="photo" />
        <img src="../asset/down.svg" alt="dropdown" />
      </div>
    </header>

    <div class="layout">
      <aside class="menu-bar">
        <button onclick="location.href='../pages/dashboardV2.html'">
          <img src="../asset/dashboard-two (1).svg" alt="dashboard" />
          <p>Dashboard</p>
        </button>
        <button onclick="location.href='../pages/transfer.html'">
          <img src="../asset/Send.svg" alt="transfer" />
          <p>Transfer</p>
        </button>
        <button onclick="location.href='../pages/history.html'">
          <img src="../asset/history.svg" alt="history" />
          <p>History</p>
        </button>
        <button onclick="location.href='../pages/topUp.html'">
          <img src="../asset/Upload.svg" alt="top Up" />
          <p>Top Up</p>
        </button>
        <button onclick="location.href='../pages/editProfileNext.html'">
          <img src="../asset/2 User.svg" alt="profile" />
          <p>Profile</p>
        </button>
        <button class="exit">
          <img src="../asset/Icon.svg" alt="Exit" />
          <p>Keluar</p>
        </button>
      </aside>

      <main class="content">
        <div class="page-title">
          <img src="/asset/2 User.svg" alt="icon-profile" />
          <p>Profile</p>
        </div>

        <section class="card-section">
          <div class="profile-picture">
            <h3>Profile Picture</h3>

            <div class="picture-content">
              <div class="picture-preview">
                <img
                  src="../asset/ghaluh.svg"
                  alt="photo-profile"
                  class="preview-img"
                />
              </div>

              <div class="picture-action">
                <button class="btn-change">
                  <img src="/asset/Edit Square.svg" alt="icon profile" />
                  <span>Change Profile</span>
                </button>
                <button>
                  <img src="/asset/Trash.svg" alt="icon trash" />
                  <span>Delete Profile</span>
                </button>
              </div>
            </div>

            <div class="picture-note">
              <p>The profile picture must be 512 x 512 pixels or less</p>
            </div>
          </div>

          <div class="form-group">
            <label>Full Name</label>
            <div class="input-box">
              <img src="../asset/User edit.svg" alt="name-box" />
              <input type="text" placeholder="Enter Full Name" />
            </div>
          </div>

          <div class="form-group">
            <label>Phone</label>
            <div class="input-box">
              <img src="../asset/Phone.svg" alt="phone-box" />
              <input type="tel" placeholder="Enter Your Number Phone" />
            </div>
          </div>

          <div class="form-group">
            <label>Email</label>
            <div class="input-box">
              <img src="../asset/mail2.svg" alt="mail-box" />
              <input type="email" placeholder="Enter Your Email" />
            </div>
          </div>

          <div class="form-group">
            <label>Password</label>
            <a href="#" class="link-action">Change Password</a>
          </div>

          <div class="form-group">
            <label>PIN</label>
            <a href="#" class="link-action">Change PIN</a>
          </div>

          <button class="btn-submit">Submit</button>
        </section>
      </main>
    </div>
  </body>
</html>
